<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 2 - Javascript</title>
    <style>
        table {
            width: 80%;
            border-collapse: collapse;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: left;
        }
        thead {
            background-color: #f2f2f2;
        }
        tfoot {
            font-weight: bold;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

<h2 style="text-align: center;">Data Detail Pegawai</h2>

<table id="tabelPegawai">
    <thead>
        <tr>
            <th>Nama Pegawai</th>
            <th>Umur</th>
            <th>Jabatan</th>
            <th>Status</th>
            <th>Gaji Pokok</th>
            <th>Tunjangan Jabatan</th>
            <th>BPJS</th>
            <th>Tunjangan Keluarga</th>
        </tr>
    </thead>
    <tbody id="isiTabel">
        </tbody>
    <tfoot id="footerTabel">
        </tfoot>
</table>

<script>
    let nama = "Dodi Prayodi";
    let umur = 25;
    let jabatan = "Manajer";
    let status = "Menikah";

    let gapok = 0;
    if (jabatan === "Manajer") {
        gapok = 15000000;
    } else if (jabatan === "Asisten Manajer") {
        gapok = 10000000;
    } else if (jabatan === "Staff") {
        gapok = 5000000;
    }

    let tunjanganJabatan = 0.15 * gapok;
    let bpjs = 0.10 * gapok;

    let tunjanganKeluarga = (status === "Menikah") ? (0.20 * gapok) : 0;

    let totalGaji = gapok + tunjanganJabatan + tunjanganKeluarga - bpjs;

    const formatRupiah = (angka) => {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR' }).format(angka);
    };

    document.getElementById("isiTabel").innerHTML = `
        <tr>
            <td>${nama}</td>
            <td>${umur} Tahun</td>
            <td>${jabatan}</td>
            <td>${status}</td>
            <td>${formatRupiah(gapok)}</td>
            <td>${formatRupiah(tunjanganJabatan)}</td>
            <td>${formatRupiah(bpjs)}</td>
            <td>${formatRupiah(tunjanganKeluarga)}</td>
        </tr>
    `;

    document.getElementById("footerTabel").innerHTML = `
        <tr>
            <td colspan="7" style="text-align: right;">Total Gaji Bersih:</td>
            <td>${formatRupiah(totalGaji)}</td>
        </tr>
    `;
</script>

</body>
</html>
